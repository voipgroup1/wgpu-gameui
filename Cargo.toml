[package]
name = "wgpu-gameui"
version = "0.1.0"
edition = "2024"
description = "Custom wgpu-based game UI library"
license = "MIT OR Apache-2.0"
repository = "https://github.com/serialexp/wgpu-gameui"

[dependencies]
wgpu = "24"
bytemuck = { version = "1", features = ["derive"] }
glyphon = "0.8"
log = "0.4"

[dev-dependencies]
winit = "0.30"
pollster = "0.3"
env_logger = "0.11"

[[example]]
name = "hello_ui"
path = "examples/hello_ui.rs"
